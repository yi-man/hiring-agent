name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run type-check
        run: bun run type-check

  test:
    name: Jest Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: apple
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bia
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h 127.0.0.1 -U apple -d bia"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # VM runner (no job container): service ports map to localhost — not the Docker service hostnames.
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: '5432'
      POSTGRES_USER: apple
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: bia
      DATABASE_URL: postgresql://apple:postgres@127.0.0.1:5432/bia
      REDIS_URL: redis://127.0.0.1:6379
      # PostgreSQL/Redis: job services. LLM: same env contract as .env.local — only OPENAI_API_KEY in secrets is not enough if you use Doubao etc.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL || vars.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
      OPENAI_EMBEDDING_USE_MULTIMODAL: ${{ secrets.OPENAI_EMBEDDING_USE_MULTIMODAL || vars.OPENAI_EMBEDDING_USE_MULTIMODAL || 'auto' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
      # PRs avoid real external LLM calls; push to main still runs the full suite.
      - name: Run Jest (pull request — without real-deps LLM file)
        if: github.event_name == 'pull_request'
        run: >-
          bun run test:ci --
          --testPathIgnorePatterns tests/integration/chat/real-deps.e2e.test.ts
          --testPathIgnorePatterns tests/integration/candidate-communication/communication-flow.e2e.test.ts
      - name: Run Jest (full suite — push / merge queue)
        if: github.event_name != 'pull_request'
        run: bun run test:ci

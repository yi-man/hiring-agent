name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run type-check
        run: bun run type-check

  test:
    name: Jest Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hiring
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # VM runner (no job container): service ports map to localhost — not the Docker service hostnames.
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: '3306'
      MYSQL_USER: root
      MYSQL_PASS: root
      MYSQL_DATABASE: hiring
      REDIS_URL: redis://127.0.0.1:6379
      NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000
      # MySQL/Redis: job services. LLM: same env contract as .env.local — only OPENAI_API_KEY in secrets is not enough if you use Doubao etc.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL || vars.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
      OPENAI_EMBEDDING_USE_MULTIMODAL: ${{ secrets.OPENAI_EMBEDDING_USE_MULTIMODAL || vars.OPENAI_EMBEDDING_USE_MULTIMODAL || 'auto' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # PRs avoid real external LLM calls; push to main still runs the full suite.
      - name: Run Jest (pull request — without real-deps LLM file)
        if: github.event_name == 'pull_request'
        run: >-
          bun run test:ci --
          --testPathIgnorePatterns tests/integration/chat/real-deps.e2e.test.ts
      - name: Run Jest (full suite — push / merge queue)
        if: github.event_name != 'pull_request'
        run: bun run test:ci
